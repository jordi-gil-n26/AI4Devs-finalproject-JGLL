name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # --rerun-tasks defeats task caching so tests always execute (never
      # reported as up-to-date), and the test report is uploaded for inspection.
      - name: Run tests
        run: ./gradlew test --no-daemon --rerun-tasks

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/test-results/test/*.xml
          if-no-files-found: warn

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --include=dev

      # This step will expose exactly why vitest is missing
      - name: Troubleshoot and Debug
        run: |
          echo "=== Content of package.json ==="
          cat package.json
          echo "=== Checking if vitest binary exists ==="
          ls -la node_modules/.bin/vitest || echo "Vitest binary NOT found in node_modules"

      - name: Run tests
        run: npm run test --if-present
