name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('backend/**/*.gradle*', 'backend/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # --rerun-tasks defeats task caching so tests always execute (never
      # reported as up-to-date), and the test report is uploaded for inspection.
      - name: Run tests
        run: ./gradlew test --no-daemon --rerun-tasks

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/test-results/test/*.xml
          if-no-files-found: warn

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Upgrading to Node 22 fixes the Ubuntu 24.04 environment incompatibility
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # --no-package-lock forces npm to ignore the potentially corrupted lockfile entries
      - name: Install dependencies
        run: npm install --include=dev --no-package-lock --no-audit --no-fund

      - name: Run tests
        run: npm run test --if-present

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & start the full stack
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build -d

      - name: Wait for frontend to be healthy
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000/search > /dev/null; then echo "frontend up"; exit 0; fi
            sleep 5
          done
          echo "frontend did not become healthy"
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs --tail=120
          exit 1

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend deps + Playwright browser
        working-directory: frontend
        run: |
          npm install --include=dev --no-package-lock --no-audit --no-fund
          npx playwright install --with-deps chromium

      - name: Run Playwright
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: warn

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down -v
